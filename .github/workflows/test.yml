name: "NixOS Test"
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v2
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build System Configuration
        run: |
          nix build .#nixosConfigurations.dell5510.config.system.build.toplevel
